<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>伊甸世界地图</title>
    <style>
        body { margin: 20px; background: #1a1a2e; color: #fff; font-family: sans-serif; }
        h1 { text-align: center; }
        img { display: block; margin: 20px auto; border: 2px solid #444; }
        .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color { width: 20px; height: 20px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🌍 伊甸世界 - 地图预览</h1>
    <img src="map-preview.png" alt="地图" width="800" height="400">
    <div class="legend">
        <div class="legend-item"><div class="color" style="background:#1e50aa"></div>海洋</div>
        <div class="legend-item"><div class="color" style="background:#3268a8"></div>湖泊</div>
        <div class="legend-item"><div class="color" style="background:#3c5a3c"></div>森林</div>
        <div class="legend-item"><div class="color" style="background:#64b450"></div>草地</div>
        <div class="legend-item"><div class="color" style="background:#dcc897"></div>平原</div>
        <div class="legend-item"><div class="color" style="background:#e6c864"></div>沙漠</div>
        <div class="legend-item"><div class="color" style="background:#787878"></div>山地</div>
        <div class="legend-item"><div class="color" style="background:#5a6e3c"></div>丘陵</div>
    </div>
</body>
</html>
