            background: #1a1a2e;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 10px;
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s ease;

        .stat-fill.health { background: linear-gradient(90deg, #e74c3c, #27ae60); }
        
        .stat-value {
            width: 40px;
            text-align: right;
            font-size: 12px;
            color: #888;
        }
        
        .action-row {
            margin: 15px 0;

            background: rgba(74, 169, 74, 0.15);

            text-align: center;
        }
        
        .action-label {

        .dna-attrs {

            gap: 5px;
            font-size: 11px;
        }
        
        .dna-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        
        .dna-row span:first-child {

        }
        
        .dna-row span:last-child {

        /* 点击提示 */
        .click-hint {
