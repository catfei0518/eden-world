<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊甸世界 - Eden World (PixiJS)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 95vh;
            margin-top: 5vh;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            color: #aaa;
        }
        .controls kbd {
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }
        .title {
            position: fixed;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #4a9;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="title">🌍 伊甸世界 (PixiJS)</div>
    <div id="game-container">
        <div id="loading" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#4a9;font-size:24px;">🌍 加载中...</div>
    </div>
    <div class="controls">
        <kbd>WASD</kbd>/<kbd>方向键</kbd> 移动
        |
        <kbd>1</kbd> 远景 <kbd>2</kbd> 标准 <kbd>3</kbd> 近景
        |
        鼠标拖拽 | 滚轮缩放
    </div>
    <script src="./bundle.js"></script>
</body>
</html>
