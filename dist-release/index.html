<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊甸世界 - Eden World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            display: block;
            width: 100vw;
            height: 95vh;
            margin: 5vh 0 0 0;
        }
        
        #game-container canvas {
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            border-radius: 4px;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            color: #aaa;
        }
        
        .controls kbd {
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #4a9;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #4a9;
        }
    </style>
</head>
<body>
    <div class="title">🌍 伊甸世界</div>
    
    <div id="game-container">
        <div class="loading">加载中...</div>
    </div>
    
    <div class="controls">
        <kbd>WASD</kbd> / <kbd>方向键</kbd> 移动
        |
        <kbd>1</kbd> 远景
        <kbd>2</kbd> 标准
        <kbd>3</kbd> 近景
        |
        鼠标拖拽移动 | 滚轮缩放
    </div>
    
    <script src="./bundle.js"></script>
</body>
</html>
