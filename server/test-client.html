<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>伊甸世界 - 连接测试</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #2d5a27; }
        .disconnected { background: #5a2727; }
        .message { padding: 5px; margin: 2px 0; background: #333; border-radius: 3px; font-family: monospace; }
        pre { background: #222; padding: 10px; border-radius: 5px; overflow-x: auto; }
        canvas { border: 2px solid #4CAF50; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🌍 伊甸世界 - 服务器测试</h1>
    
    <div id="status" class="status disconnected">未连接</div>
    
    <div id="info"></div>
    
    <canvas id="canvas" width="800" height="400"></canvas>
    
    <div id="messages"></div>
    
    <script>
        const ws = new WebSocket('ws://114.66.13.167:3334');
        const status = document.getElementById('status');
        const info = document.getElementById('info');
        const messages = document.getElementById('messages');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = null;
        
        ws.onopen = () => {
            status.textContent = '✅ 已连接';
            status.className = 'status connected';
            addMessage('连接成功');
        };
        
        ws.onclose = () => {
            status.textContent = '❌ 断开连接';
            status.className = 'status disconnected';
        };
        
        ws.onerror = (err) => {
            addMessage('错误: ' + err);
        };
        
        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                addMessage('收到: ' + msg.type);
                
                if (msg.type === 'init' || msg.type === 'state') {
                    gameState = msg.data;
                    render();
                }
            } catch (e) {
                addMessage('解析错误: ' + e.message);
            }
        };
        
        function addMessage(text) {
            const div = document.createElement('div');
            div.className = 'message';
            div.textContent = text;
            messages.prepend(div);
        }
        
        function render() {
            if (!gameState) return;
            
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制角色
            const chars = gameState.characters || [];
            chars.forEach(char => {
                const x = char.x * 8;
                const y = char.y * 8;
                
                // 名字
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(x - 10, y - 20, 40, 20);
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.fillText(char.name, x - 8, y - 6);
                
                // 状态条
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 10, y + 5, 40, 4);
                ctx.fillStyle = '#f44336'; // 饥饿
                ctx.fillRect(x - 10, y + 5, 40 * (char.hunger / 100), 4);
                
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 10, y + 12, 40, 4);
                ctx.fillStyle = '#2196F3'; // 口渴
                ctx.fillRect(x - 10, y + 12, 40 * (char.thirst / 100), 4);
                
                // 动作
                ctx.fillStyle = '#FFC107';
                ctx.fillText(char.action, x - 8, y + 28);
            });
            
            // 显示信息
            info.innerHTML = `
                <p>角色数: ${chars.length}</p>
                <pre>${JSON.stringify(chars, null, 2)}</pre>
            `;
        }
        
        // 定时刷新画面
        setInterval(render, 100);
    </script>
</body>
</html>
