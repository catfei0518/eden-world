<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊甸世界 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* 背景动画 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(74, 158, 158, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        /* 登录容器 */
        .login-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 780px;
            padding: 40px;
            background: rgba(10, 10, 30, 0.95);
            border: 2px solid rgba(74, 158, 158, 0.5);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(74, 158, 158, 0.2);
            backdrop-filter: blur(10px);
            max-height: 95vh;
            overflow-y: auto;
            margin: 0 auto;
        }
        
        /* 隐藏滚动条 */
        .login-container::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        .login-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 平板适配 */
        @media (max-width: 900px) {
            .login-container {
                max-width: 90%;
                padding: 30px;
            }
        }
        
        /* 移动端适配 */
        @media (max-width: 600px) {
            .login-container {
                width: 95%;
                padding: 25px;
                border-radius: 15px;
            }
            
            .title h1 {
                font-size: 26px !important;
                letter-spacing: 2px !important;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
        
        /* 标题 */
        .title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title h1 {
            font-size: 36px;
            color: #4a9;
            text-shadow: 0 0 20px rgba(74, 158, 158, 0.5);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }
        
        .title p {
            color: #888;
            font-size: 14px;
        }
        
        /* 公告板 */
        .announcement {
            background: rgba(74, 158, 158, 0.1);
            border: 1px solid rgba(74, 158, 158, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
        }
        
        .announcement h3 {
            color: #4a9;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .announcement-content {
            color: #aaa;
            font-size: 12px;
            line-height: 1.6;
            max-height: 80px;
            overflow-y: auto;
        }
        
        .announcement-content::-webkit-scrollbar {
            width: 4px;
        }
        
        .announcement-content::-webkit-scrollbar-thumb {
            background: #4a9;
            border-radius: 2px;
        }
        
        /* 版本信息 */
        .version-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        
        .version-info span {
            color: #666;
            font-size: 12px;
        }
        
        .version-info .status {
            color: #4a9;
        }
        
        .version-info .status.outdated {
            color: #e74c3c;
        }
        
        .check-update-btn {
            background: none;
            border: 1px solid #4a9;
            color: #4a9;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .check-update-btn:hover {
            background: #4a9;
            color: #fff;
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #888;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4a9;
            box-shadow: 0 0 10px rgba(74, 158, 158, 0.3);
        }
        
        .form-group input::placeholder {
            color: #555;
        }
        
        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4a9, #3a8);
            color: #fff;
            box-shadow: 0 4px 15px rgba(74, 158, 158, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 158, 0.5);
        }
        
        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        
        /* 服务器选择 */
        .server-select {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .server-select label {
            color: #888;
            font-size: 13px;
            margin-bottom: 10px;
            display: block;
        }
        
        .server-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .server-item:hover {
            border-color: #4a9;
            background: rgba(74, 158, 158, 0.1);
        }
        
        .server-item.selected {
            border-color: #4a9;
            background: rgba(74, 158, 158, 0.2);
        }
        
        .server-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        .server-name {
            color: #fff;
            font-size: 14px;
        }
        
        .server-status {
            font-size: 11px;
            color: #4a9;
        }
        
        .server-status.offline {
            color: #e74c3c;
        }
        
        .server-status.busy {
            color: #f39c12;
        }
        
        /* 提示消息 */
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        
        .message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            color: #e74c3c;
            display: block;
        }
        
        .message.success {
            background: rgba(74, 158, 158, 0.2);
            border: 1px solid rgba(74, 158, 158, 0.5);
            color: #4a9;
            display: block;
        }
        
        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(74, 158, 158, 0.2);
            border-top-color: #4a9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 底部版权 */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #555;
            font-size: 11px;
        }
        
        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .overlay.show {
            display: flex;
        }
        
        .modal {
            background: #1a1a2e;
            border: 2px solid #4a9;
            border-radius: 15px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }
        
        .modal h2 {
            color: #4a9;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .modal .btn-group {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="particles"></div>
    
    <!-- 登录容器 -->
    <div class="login-container">
        <div class="title">
            <h1>伊甸世界</h1>
            <p>Eden World - 智能生命模拟游戏</p>
        </div>
        
        <!-- 公告板 -->
        <div class="announcement">
            <h3>📢 最新公告 <span id="update-time"></span></h3>
            <div class="announcement-content" id="announcement-content">
                正在加载公告...
            </div>
        </div>
        
        <!-- 版本信息 -->
        <div class="version-info">
            <span>当前版本: <span class="status" id="version">v0.14.2</span></span>
            <button class="check-update-btn" id="check-update-btn">检查更新</button>
        </div>
        
        <!-- 资源状态 -->
        <div class="version-info" style="font-size: 11px; margin-top: 5px;">
            <span>本地缓存: <span id="cache-status">未检测</span></span>
            <button class="check-update-btn" id="download-btn" style="padding: 3px 8px; font-size: 10px;">下载</button>
            <button class="check-update-btn" id="clear-cache-btn" style="padding: 3px 8px; font-size: 10px;">清除</button>
        </div>
        
        <!-- 下载进度 -->
        <div id="download-progress" style="display: none; margin-top: 10px;">
            <div style="font-size: 11px; color: #aaa; margin-bottom: 3px;">
                正在下载资源: <span id="download-percent">0%</span>
            </div>
            <div style="background: #333; border-radius: 3px; height: 6px; overflow: hidden;">
                <div id="download-bar" style="background: #4CAF50; height: 100%; width: 0%; transition: width 0.2s;"></div>
            </div>
            <div style="font-size: 10px; color: #888; margin-top: 2px;" id="download-info">准备中...</div>
        </div>
        
        <!-- 资源下载提示（资源缺失时显示） -->
        <div id="download-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;">
            <div style="text-align: center; padding: 30px; background: #1a1a1a; border-radius: 15px; max-width: 400px;">
                <div style="font-size: 48px; margin-bottom: 15px;">📦</div>
                <h2 id="overlay-title" style="color: #fff; margin-bottom: 10px;">需要下载游戏资源</h2>
                <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">
                    <span id="overlay-desc-first">首次运行需要下载游戏资源包</span>
                    <span id="overlay-desc-update" style="display:none">有新版本资源包，点击更新</span>
                    <br>
                    <span id="overlay-desc-common">下载后即可游玩游戏</span>
                </p>
                <div style="margin-bottom: 20px;">
                    <div style="background: #333; border-radius: 3px; height: 8px; overflow: hidden;">
                        <div id="overlay-download-bar" style="background: #4CAF50; height: 100%; width: 0%; transition: width 0.3s;"></div>
                    </div>
                    <div style="font-size: 12px; color: #888; margin-top: 5px;" id="overlay-download-info">准备中...</div>
                </div>
                <button id="overlay-download-btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 40px; border-radius: 25px; font-size: 16px; cursor: pointer; transition: transform 0.2s;">
                    开始下载
                </button>
            </div>
        </div>
        
        <!-- 登录表单 -->
        <form id="login-form">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" placeholder="请输入账号" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            
            <div class="message" id="login-message"></div>
            
            <div class="btn-group">
                <button type="submit" class="btn btn-primary" id="login-btn">登录</button>
                <button type="button" class="btn btn-secondary" id="register-btn">注册</button>
            </div>
        </form>
        
        <!-- 加载动画 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loading-text">正在连接服务器...</p>
        </div>
        
        <!-- 服务器选择 -->
        <div class="server-select">
            <label>选择服务器</label>
            <div class="server-item selected" data-server="main">
                <div class="server-info">
                    <span class="server-name">🌍 全球服 - 亚洲</span>
                    <span class="server-status">在线 · 0人</span>
                </div>
                <span>→</span>
            </div>
        </div>
        
        <div class="footer">
            © 2024 伊甸世界 · 智能AI驱动
        </div>
    </div>
    
    <!-- 注册弹窗 -->
    <div class="overlay" id="register-overlay">
        <div class="modal">
            <h2>创建账号</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="reg-username" placeholder="3-20位字母或数字" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="6位以上" required>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="reg-password-confirm" placeholder="再次输入密码" required>
                </div>
                <div class="message" id="register-message"></div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">注册</button>
                    <button type="button" class="btn btn-secondary" id="cancel-register">取消</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 更新管理器 -->
    <script src="/lobby-assets/update-manager.js"></script>
    
    <script>
        // 配置（API_BASE 已在 update-manager.js 中定义）
        let currentServer = 'main';
        let token = localStorage.getItem('eden_token');
        let localVersion = localStorage.getItem('eden_version') || 'v0.0.0';
        let updateManager = window.updateManager;
        
        // 初始化粒子背景
        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        
        // 显示/隐藏加载
        function setLoading(show, text = '正在连接服务器...') {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('login-form').style.display = show ? 'none' : 'block';
            document.getElementById('loading-text').textContent = text;
        }
        
        // 显示消息
        function showMessage(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'message ' + type;
            setTimeout(() => {
                el.className = 'message';
            }, 5000);
        }
        
        // 初始化
        async function initApp() {
            const versionEl = document.getElementById('version');
            const cacheStatus = document.getElementById('cache-status');
            const downloadBtn = document.getElementById('download-btn');
            const loginBtn = document.getElementById('login-btn');
            const overlay = document.getElementById('download-overlay');
            
            try {
                // 初始化更新管理器
                await updateManager.init();
                
                // 获取服务器版本信息
                const res = await fetch(`${API_BASE}/api/version`);
                const data = await res.json();
                
                const serverVersion = data.version;
                versionEl.textContent = serverVersion;
                
                // 检查本地资源版本
                const localResourceVersion = await updateManager.getLocalResourceVersion();
                const isFirstTime = !localResourceVersion;
                
                // 检查是否有完整缓存
                const hasFullCache = await updateManager.hasFullCache();
                
                // 获取下载按钮文字
                const overlayTitle = document.getElementById('overlay-title');
                const overlayDescFirst = document.getElementById('overlay-desc-first');
                const overlayDescUpdate = document.getElementById('overlay-desc-update');
                const overlayDownloadBtn = document.getElementById('overlay-download-btn');
                
                // 显示缓存状态
                if (hasFullCache) {
                    const cacheSize = await updateManager.getCacheSize();
                    cacheStatus.textContent = updateManager.formatSize(cacheSize);
                    // 缓存完整，登录可用
                    downloadBtn.disabled = true;
                    downloadBtn.style.opacity = '0.5';
                    loginBtn.disabled = false;
                    loginBtn.style.opacity = '1';
                    // 隐藏下载提示
                    overlay.style.display = 'none';
                } else {
                    cacheStatus.textContent = '未缓存';
                    // 缓存不完整，显示下载提示，登录禁用
                    downloadBtn.disabled = false;
                    downloadBtn.style.opacity = '1';
                    loginBtn.disabled = true;
                    loginBtn.style.opacity = '0.5';
                    // 显示下载提示，根据情况显示不同文案
                    if (isFirstTime) {
                        // 首次下载
                        overlayTitle.textContent = '需要下载游戏资源';
                        overlayDescFirst.style.display = 'inline';
                        overlayDescUpdate.style.display = 'none';
                        overlayDownloadBtn.textContent = '开始下载';
                    } else {
                        // 更新
                        overlayTitle.textContent = '资源包有更新';
                        overlayDescFirst.style.display = 'none';
                        overlayDescUpdate.style.display = 'inline';
                        overlayDownloadBtn.textContent = '立即更新';
                    }
                    overlay.style.display = 'flex';
                }
                
                // 更新公告
                document.getElementById('announcement-content').innerHTML = data.announcement || '暂无公告';
                document.getElementById('update-time').textContent = data.updateTime || '';
                
            } catch (e) {
                console.error('初始化失败:', e);
                cacheStatus.textContent = '未缓存';
                // 出错时也要求下载
                downloadBtn.disabled = false;
                downloadBtn.style.opacity = '1';
                loginBtn.disabled = true;
                loginBtn.style.opacity = '0.5';
                // 显示下载提示
                overlay.style.display = 'flex';
            }
        }
        
        // 下载资源
        async function downloadResources() {
            const progressDiv = document.getElementById('download-progress');
            const percentEl = document.getElementById('download-percent');
            const barEl = document.getElementById('download-bar');
            const infoEl = document.getElementById('download-info');
            const cacheStatus = document.getElementById('cache-status');
            const downloadBtn = document.getElementById('download-btn');
            const loginBtn = document.getElementById('login-btn');
            const overlay = document.getElementById('download-overlay');
            const overlayBar = document.getElementById('overlay-download-bar');
            const overlayInfo = document.getElementById('overlay-download-info');
            
            progressDiv.style.display = 'block';
            downloadBtn.disabled = true;
            downloadBtn.style.opacity = '0.5';
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.5';
            cacheStatus.textContent = '下载中...';
            
            try {
                // 使用自动恢复下载（会自动重试 + 清除损坏缓存）
                const result = await updateManager.downloadWithAutoRecovery((info) => {
                    percentEl.textContent = `${info.progress}%`;
                    barEl.style.width = `${info.progress}%`;
                    infoEl.textContent = `${info.completed}/${info.total}`;
                    cacheStatus.textContent = `${info.completed}/${info.total}`;
                    // 更新overlay进度
                    overlayBar.style.width = `${info.progress}%`;
                    overlayInfo.textContent = `${info.completed}/${info.total} - ${info.current}`;
                });
                
                if (result.success) {
                    // 下载完成
                    const cacheSize = await updateManager.getCacheSize();
                    cacheStatus.textContent = updateManager.formatSize(cacheSize);
                    progressDiv.style.display = 'none';
                    
                    // 隐藏下载提示
                    overlay.style.display = 'none';
                    
                    // 启用登录
                    downloadBtn.disabled = true;
                    downloadBtn.style.opacity = '0.5';
                    loginBtn.disabled = false;
                    loginBtn.style.opacity = '1';
                } else {
                    // 自动恢复失败，显示恢复UI
                    console.log('❌ 自动恢复失败，显示恢复UI');
                    cacheStatus.textContent = '需要手动修复';
                    downloadBtn.disabled = false;
                    downloadBtn.style.opacity = '1';
                    overlayInfo.textContent = '自动修复失败，请点击下方按钮';
                    updateManager.showRecoveryUI();
                }
                
            } catch (e) {
                console.error('下载资源失败:', e);
                cacheStatus.textContent = '下载失败';
                downloadBtn.disabled = false;
                downloadBtn.style.opacity = '1';
                overlayInfo.textContent = '下载失败，请重试';
                // 显示恢复UI
                updateManager.showRecoveryUI();
            }
        }
        
        // 绑定下载按钮事件
        document.getElementById('download-btn').addEventListener('click', downloadResources);
        document.getElementById('overlay-download-btn').addEventListener('click', downloadResources);
        
        // 登录
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            setLoading(true, '正在登录...');
            
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('eden_token', data.token);
                    localStorage.setItem('eden_username', username);
                    showMessage('login-message', '登录成功！正在进入游戏...', 'success');
                    
                    // 跳转到游戏（带上token）
                    setTimeout(() => {
                        window.location.href = '/client?token=' + encodeURIComponent(data.token);
                    }, 1000);
                } else {
                    setLoading(false);
                    showMessage('login-message', data.error || '登录失败', 'error');
                }
            } catch (e) {
                setLoading(false);
                showMessage('login-message', '网络错误，请检查服务器连接', 'error');
            }
        });
        
        // 注册弹窗
        document.getElementById('register-btn').addEventListener('click', () => {
            document.getElementById('register-overlay').classList.add('show');
        });
        
        document.getElementById('cancel-register').addEventListener('click', () => {
            document.getElementById('register-overlay').classList.remove('show');
        });
        
        // 注册
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const passwordConfirm = document.getElementById('reg-password-confirm').value;
            
            if (password !== passwordConfirm) {
                showMessage('register-message', '两次密码输入不一致', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('register-message', '密码至少6位', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('register-message', '注册成功！请登录', 'success');
                    setTimeout(() => {
                        document.getElementById('register-overlay').classList.remove('show');
                        document.getElementById('username').value = username;
                    }, 1500);
                } else {
                    showMessage('register-message', data.error || '注册失败', 'error');
                }
            } catch (e) {
                showMessage('register-message', '网络错误', 'error');
            }
        });
        
        // 服务器选择
        document.querySelectorAll('.server-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.server-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentServer = item.dataset.server;
            });
        });
        
        // 初始化
        initParticles();
        initApp();
        
        // 更新缓存状态显示
        async function updateCacheStatus() {
            try {
                await updateManager.init();
                const size = await updateManager.getCacheSize();
                document.getElementById('cache-status').textContent = updateManager.formatSize(size);
            } catch (e) {
                document.getElementById('cache-status').textContent = '未初始化';
            }
        }
        
        // 更新在线玩家数量
        async function updatePlayerCount() {
            try {
                const res = await fetch(`${API_BASE}/api/players/count`);
                const data = await res.json();
                
                // 更新服务器状态显示（支持单服务器和多服务器格式）
                const serverItems = document.querySelectorAll('.server-item');
                if (data.servers && Array.isArray(data.servers)) {
                    // 多服务器格式
                    serverItems.forEach((item, index) => {
                        const statusSpan = item.querySelector('.server-status');
                        if (statusSpan && data.servers[index]) {
                            statusSpan.textContent = `在线 · ${data.servers[index].count}人`;
                        }
                    });
                } else if (data.count !== undefined) {
                    // 单服务器格式
                    const statusSpan = document.querySelector('.server-status');
                    if (statusSpan) {
                        statusSpan.textContent = `在线 · ${data.count}人`;
                    }
                }
            } catch (e) {
                console.error('获取在线人数失败:', e);
            }
        }
        
        // 定期更新在线人数（每30秒）
        setInterval(updatePlayerCount, 30000);
        updateCacheStatus();
        
        // 清除缓存按钮
        document.getElementById('clear-cache-btn').addEventListener('click', async () => {
            if (confirm('确定要清除本地缓存吗？')) {
                await updateManager.init();
                await updateManager.clearCache();
                showMessage('login-message', '缓存已清除，页面刷新中...', 'success');
                setTimeout(() => location.reload(), 800);
            }
        });
        
        // 页面加载时更新在线人数
        updatePlayerCount();
        
        // 如果 URL 有 redirect=client 参数，说明是从游戏页面跳转来的
        // 不要自动跳转，等待用户操作
        const urlParams = new URLSearchParams(window.location.search);
        const fromRedirect = urlParams.get('redirect') === 'client';
        
        // 如果已登录，且不是从游戏页面跳转来的，不做任何处理
        // 保持正常的登录表单让用户可以正常登录
    </script>
</body>
</html>
